---
name: dockerfile-lint

on:
  pull_request:
    paths:
      - 'docker/**'

jobs:
  test_docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: jbergstroem/hadolint-gh-action@d2f58da7f4f242dc0b6c5ef882ad4f8e871ba96b # v1
        with:
          dockerfile: 'docker/*Dockerfile'
          annotate: false
